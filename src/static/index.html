<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Black Ice Monitoring Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div>
      <h1>실시간 도로결빙 모니터링 대시보드</h1>
      <p>기준 학교: <strong>__SCHOOL_NAME__</strong></p>
    </div>
    <div class="header-actions">
      <button id="reset-view-btn" class="button secondary">학교 주변으로 돌아가기</button>
      <button id="fit-nodes-btn" class="button">전체 노드 보기</button>
    </div>
  </header>

  <main class="layout">
    <section class="map-card">
      <div id="map"></div>
    </section>

    <section class="side-panel">
      <div class="panel-card">
        <div class="panel-title-row">
          <h2>노드 상태 요약</h2>
          <span id="node-count" class="muted">0개</span>
        </div>
        <div id="node-summary" class="status-grid"></div>
        <div id="node-list" class="node-list"></div>
      </div>

      <div class="panel-card">
        <h2>선택 노드 상세</h2>
        <div id="node-detail">지도의 노드를 클릭하거나 우측 목록에서 노드를 선택하면 상세 정보가 표시됩니다.</div>
      </div>

      <div class="panel-card">
        <h2>최근 측정값</h2>
        <div id="recent-list"></div>
      </div>

      <div class="panel-card">
        <h2>데이터셋</h2>
        <a class="button" href="/api/export/readings.csv">CSV 다운로드</a>
      </div>
    </section>
  </main>

  <script>
    window.BLACKICE_BOOTSTRAP = {
      schoolLat: __SCHOOL_LAT__,
      schoolLon: __SCHOOL_LON__
    };
  </script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
